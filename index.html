<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快捷</title>
    <style>
        /* 全局重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* 匹配图片中的紫色渐变背景 */
            background: linear-gradient(120deg, #5b6bff, #8c53ff);
            font-family: "Microsoft YaHei", "Heiti SC", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px; /* 控制总宽度 */
            background: rgba(255, 255, 255, 0.1); /* 半透明背景 */
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* 双栏布局 */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 分成两列 */
            gap: 20px; /* 卡片之间的间距 */
        }

        /* 卡片通用样式 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            border-top: 3px solid #ff4b55; /* 顶部的红色条 */
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        /* 标题样式 */
        .card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 5px;
        }

        /* 网址样式 */
        .card p {
            color: #666;
            font-size: 12px;
            margin-bottom: 0;
        }

        /* 链接样式 */
        a {
            text-decoration: none;
            color: inherit;
            display: block;
            width: 100%;
            height: 100%;
        }

        /* 适配手机：屏幕小于600px时变成单列 */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>快捷导航</h1>
        <div class="grid">
            <!-- 左上角：B站 -->
            <a href="https://www.bilibili.com" target="_blank">
                <div class="card">
                    <h2>哔哩哔哩 (Bilibili)</h2>
                    <p>https://www.bilibili.com</p>
                </div>
            </a>

            <!-- 右上角：必应 -->
            <a href="https://www.bing.com" target="_blank">
                <div class="card">
                    <h2>必应 (Bing)</h2>
                    <p>https://www.bing.com</p>
                </div>
            </a>

            <!-- 左下角：网易云 -->
            <a href="https://music.163.com" target="_blank">
                <div class="card">
                    <h2>网易云音乐 (NetEase Music)</h2>
                    <p>https://music.163.com</p>
                </div>
            </a>

            <!-- 右下角：Outlook -->
            <a href="https://www.outlook.com" target="_blank">
                <div class="card">
                    <h2>OutLook (OutLook)</h2>
                    <p>https://www.outlook.com</p>
                </div>
            </a>
        </div>
    </div>
</body>

</html>
